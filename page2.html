<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Download 页面</title>
  <style>
    .download-btn {
      display: inline-block;
      padding: 12px 20px;
      background-color: #1abc9c;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    .download-btn:hover {
      background-color: #16a085;
    }
  </style>
</head>
<body>
  <h1>Download 页面</h1>
  <p>点击下面的按钮下载 GitHub 库文件：</p>

  <!-- 下载整个仓库 zip -->
  <a class="download-btn" href="https://github.com/用户名/仓库名/archive/refs/heads/main.zip">
    下载仓库 ZIP
  </a>

  <!-- 下载单个文件 -->
  <a class="download-btn" href="https://github.com/Nesplayer/improvedweb/blob/main/test.dll">
    下载某个文件
  </a>

  <br><br>
  <a href="index.html">返回主页</a>
</body>
</html>
